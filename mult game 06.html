<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>互動展示遊戲</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        #display-area { margin-top: 20px; border: 1px solid #ccc; padding: 10px; min-height: 400px; }
    </style>
</head>
<body>

    <h1>巴別塔互動展示</h1>
    
    <button onclick="showImage()">圖片</button>
    <button onclick="playAudio('chi20.mp3')">聲音 1 (中文)</button>
    <button onclick="playAudio('eng20.mp3')">聲音 2 (英文)</button>

    <div id="display-area">
        <p>請點擊上方按鈕</p>
    </div>

    <script>
        function showImage() {
            // 使用 iframe 顯示 PDF
            document.getElementById('display-area').innerHTML = 
                '<iframe src="20.pdf" width="80%" height="500px"></iframe>';
        }

        function playAudio(file) {
            // 建立並播放音訊
            let audio = new Audio(file);
            audio.play();
        }
    </script>
</body>
</html>
