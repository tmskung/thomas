<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>聽力測驗遊戲</title>
</head>
<body>

    <div id="game-container">
        <h2>聽力測驗</h2>
        
        <button id="play-btn">播放聲音</button>
        
        <br><br>

        <input type="text" id="user-input" placeholder="請輸入聽到的內容">
        <button id="submit-btn">提交</button>

        <div id="feedback"></div>

        <br>
        
        <button id="next-btn">下一題</button>
    </div>

    <div id="result-container" style="display:none;">
        <h3>測驗結果</h3>
        <canvas id="scoreChart"></canvas>
    </div>

</body>
</html>
